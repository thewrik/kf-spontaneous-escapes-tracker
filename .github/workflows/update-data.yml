name: Update Flight Data
on:
  schedule:
    - cron: '0 18 * * 0'  # Every Sunday 18:00 UTC (Mon 2am SGT)
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update even if scraping fails'
        required: false
        default: 'false'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        run: pip install -r scraper/requirements.txt
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Node deps
        run: npm ci
      - name: Run scraper
        env:
          AVIATIONSTACK_API_KEY: ${{ secrets.AVIATIONSTACK_API_KEY }}
        run: python scraper/main.py
      - name: Build site
        run: npm run build
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/flights.json
          git diff --staged --quiet || git commit -m "chore: update flight data $(date -u +%Y-%m-%d)"
      - name: Push changes
        run: git push
